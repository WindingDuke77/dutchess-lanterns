name: release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Read mod version
        id: ver
        run: echo "version=$(sed -n "s/^version = '\(.*\)'/\1/p" build.gradle)" >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.exists.outputs.released == 'false'
        run: |
          # gradle.properties pins the local Windows JDK path - CI uses setup-java's
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Publish release
        if: steps.exists.outputs.released == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            "build/libs/lantern-${{ steps.ver.outputs.version }}.jar" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.ver.outputs.version }}" \
            --generate-notes
