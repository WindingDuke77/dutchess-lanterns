name: release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        id: jdk8
        with:
          distribution: temurin
          java-version: 8

      - uses: actions/setup-java@v4
        id: jdk21
        with:
          distribution: temurin
          java-version: 21

      - name: Read mod version
        id: ver
        run: echo "version=$(sed -n "s/^version = '\(.*\)'/\1/p" forge-1.12.2/build.gradle)" >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build forge-1.12.2
        if: steps.exists.outputs.released == 'false'
        working-directory: forge-1.12.2
        env:
          JAVA_HOME: ${{ steps.jdk8.outputs.path }}
        run: |
          # gradle.properties pins the local Windows JDK path - CI uses setup-java's
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Build neoforge-1.21.1
        if: steps.exists.outputs.released == 'false'
        working-directory: neoforge-1.21.1
        env:
          JAVA_HOME: ${{ steps.jdk21.outputs.path }}
        run: |
          sed -i '/org.gradle.java.home/d' gradle.properties
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Publish release
        if: steps.exists.outputs.released == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # evergreen copy under the historic stable name so
          # /releases/latest/download/lantern.jar keeps installing the 1.12.2 jar
          cp "forge-1.12.2/build/libs/lantern-forge-1.12.2-$VERSION.jar" lantern.jar
          gh release create "v$VERSION" \
            "forge-1.12.2/build/libs/lantern-forge-1.12.2-$VERSION.jar" \
            "neoforge-1.21.1/build/libs/lantern-neoforge-1.21.1-$VERSION.jar" \
            lantern.jar \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            --notes "Pick the jar matching your Minecraft version: \`lantern-forge-1.12.2-*.jar\` for Forge 1.12.2, \`lantern-neoforge-1.21.1-*.jar\` for NeoForge 1.21.1."
